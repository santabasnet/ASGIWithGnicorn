# docker-compose.yml — Local development infrastructure
#
# Provides Redis (session store) and PostgreSQL (pgqueuer job table).
# The Python app itself runs outside Docker (via uv / Gunicorn).
#
# Usage:
#   docker compose up -d          # start services
#   docker compose stop           # stop (data preserved)
#   docker compose down -v        # stop + wipe volumes
#
# Or just use the Makefile targets:
#   make start-dev                # start everything (infra + app + worker)
#   make stop-dev                 # stop everything

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy volatile-lru
        --requirepass santa
        --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "santa", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  # ── PostgreSQL (pgqueuer job table) ────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: santa
      POSTGRES_PASSWORD: santa
      POSTGRES_DB: santa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santa -d santa"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
    driver: local
